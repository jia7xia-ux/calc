<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>约拍计费系统</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #f2a6bc;
            --primary-dark: #d17a94;
            --bg: #fff9fb;
            --card-bg: #ffffff;
            --text: #5d4048;
            --accent: #ff4757;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            font-family: -apple-system, "PingFang SC", sans-serif;
            margin: 0; padding: 20px 15px;
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            width: 100%; max-width: 420px;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(242, 166, 188, 0.2);
            overflow: hidden;
        }

        .header {
            background: var(--primary);
            padding: 20px; text-align: center; color: white;
        }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 2px; }
        .header #displayDate { font-size: 13px; margin-top: 5px; opacity: 0.9; font-weight: 300; }

        .form-section { padding: 20px; }
        .group-title { font-size: 13px; font-weight: bold; color: var(--primary-dark); margin: 15px 0 10px; border-left: 4px solid var(--primary); padding-left: 8px; }

        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        
        /* 步进器 */
        .stepper { display: flex; align-items: center; background: #fff1f5; border-radius: 10px; padding: 2px; }
        .stepper button { border: none; background: white; color: var(--primary-dark); width: 32px; height: 32px; border-radius: 8px; font-weight: bold; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stepper span { width: 50px; text-align: center; font-weight: bold; font-size: 16px; }

        /* 选项框 */
        .chip-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .chip {
            background: white; border: 1px solid #eee; padding: 12px; border-radius: 12px;
            text-align: center; font-size: 13px; cursor: pointer; transition: 0.2s;
        }
        .chip.active { background: #fff1f5; border-color: var(--primary); color: var(--primary-dark); font-weight: bold; }
        
        select, .discount-input {
            width: 100%; border: 1px solid #eee; border-radius: 12px; padding: 12px;
            font-size: 14px; background: white; outline: none;
        }

        /* 账单明细 */
        .bill { background: #fffefb; border-radius: 20px; padding: 20px; margin-top: 15px; border: 1px dashed var(--primary); position: relative; }
        .bill-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .bill-divider { height: 1px; background: rgba(242, 166, 188, 0.2); margin: 10px 0; }
        .bill-total { margin-top: 5px; display: flex; justify-content: space-between; align-items: center; }
        .bill-total span:last-child { color: var(--primary-dark); font-size: 26px; font-weight: 800; }

        .promo-banner { 
            display: none; background: var(--accent); color: white; text-align: center; 
            padding: 4px; font-size: 11px; font-weight: bold; border-radius: 8px; margin-bottom: 10px;
        }

        .btn-capture {
            width: 100%; max-width: 420px; margin-top: 20px;
            background: var(--primary-dark);
            color: white; border: none; padding: 18px; border-radius: 18px;
            font-size: 16px; font-weight: bold; box-shadow: 0 8px 20px rgba(209, 122, 148, 0.3);
        }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .overlay img { max-width: 100%; border-radius: 15px; border: 3px solid white; }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <div class="header">
        <h1>拍摄费用结算单</h1>
        <div id="displayDate">正在获取日期...</div>
    </div>

    <div class="form-section">
        <div id="promoNotice" class="promo-banner">✨ 今日满足 NTU 周二/四车费减免条件 ✨</div>

        <div class="group-title">时长与人数</div>
        <div class="input-row">
            <label>拍摄时长 (h)</label>
            <div class="stepper">
                <button onclick="changeHour(-0.5)">-</button>
                <span id="hourVal">1.0</span>
                <button onclick="changeHour(0.5)">+</button>
            </div>
        </div>
        <div class="input-row">
            <label>增加人数 (+$10/h)</label>
            <div class="stepper">
                <button onclick="changePeople(-1)">-</button>
                <span id="pplVal">0</span>
                <button onclick="changePeople(1)">+</button>
            </div>
        </div>

        <div class="group-title">额外项</div>
        <div class="chip" id="gownBtn" onclick="toggleGown()" style="width: 100%; margin-bottom: 10px;">
            🎓 毕业袍租赁 (+$10/h)
        </div>
        <div class="chip-group">
            <div class="chip active" id="e_indoor" onclick="setEnv('indoor')">🏠 室内</div>
            <div class="chip" id="e_outdoor" onclick="setEnv('outdoor')">🌲 室外(+$5/h)</div>
            <div class="chip" style="grid-column: span 2;" id="e_hot" onclick="setEnv('hot')">高温30℃+(+$10/h)</div>
        </div>

        <div class="group-title">设置折扣与地点</div>
        <div class="input-row">
            <label>尾款折扣</label>
            <input type="number" id="discountInput" class="discount-input" value="0.9" step="0.05" min="0.1" max="1.0" oninput="calc()" style="width: 80px; padding: 6px;">
        </div>
        <select id="loc" onchange="calc()">
            <option value="8">NTU / NUS ($8)</option>
            <option value="10">其他地点 ($10)</option>
        </select>

        <div class="bill">
            <div class="bill-item"><span>基础服务费</span><span id="row_base"></span></div>
            <div class="bill-item"><span>交通费用</span><span id="row_trans"></span></div>
            <div class="bill-divider"></div>
            <div class="bill-item"><span>项目总计</span><b id="row_total_raw"></b></div>
            <div class="bill-item" style="color: var(--accent); font-weight: bold;">
                <span>已付定金 (抵扣)</span><b>-$25.0</b>
            </div>
            <div class="bill-divider"></div>
            <div class="bill-item"><span>折前应付尾款</span><span id="row_rem_raw"></span></div>
            <div class="bill-item" style="color: var(--primary-dark);">
                <span>尾款折扣 (<span id="ds_show">0.9</span>)</span>
                <span id="row_ds_val"></span>
            </div>
            <div class="bill-total">
                <span>拍完补差价</span>
                <span id="finalPrice">$0.0</span>
            </div>
        </div>
    </div>
</div>

<button class="btn-capture" onclick="capture()">生成凭证发给客户</button>

<div class="overlay" id="overlay" onclick="this.style.display='none'">
    <img id="previewImg">
    <p style="color:white; margin-top:10px">↑ 长按图片保存到相册 ↑</p>
</div>

<script>
    let state = { hours: 1.0, extraPpl: 0, hasGown: false, env: 'indoor' };

    // 1. 设置并显示日期
    const today = new Date();
    const dateStr = today.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    document.getElementById('displayDate').innerText = dateStr;

    function changeHour(v) { state.hours = Math.max(0.5, state.hours + v); document.getElementById('hourVal').innerText = state.hours.toFixed(1); calc(); }
    function changePeople(v) { state.extraPpl = Math.max(0, state.extraPpl + v); document.getElementById('pplVal').innerText = state.extraPpl; calc(); }
    function toggleGown() { state.hasGown = !state.hasGown; document.getElementById('gownBtn').classList.toggle('active'); calc(); }
    function setEnv(t) { state.env = t; ['e_indoor', 'e_outdoor', 'e_hot'].forEach(id => document.getElementById(id).classList.remove('active')); document.getElementById('e_' + t).classList.add('active'); calc(); }

    function calc() {
        // 2. 基础单价计算
        let rate = 30 + (state.extraPpl * 10);
        if(state.hasGown) rate += 10;
        if(state.env === 'outdoor') rate += 5;
        if(state.env === 'hot') rate += 10;

        const baseTotal = rate * state.hours;

        // 3. 交通费判断 (4月30日前周二周四NTU免单)
        let transFee = parseInt(document.getElementById('loc').value);
        const day = today.getDay(); // 2是周二, 4是周四
        const isPromoTime = today <= new Date('2026-04-30');
        const isNTU = transFee === 8;
        
        if (isPromoTime && (day === 2 || day === 4) && isNTU) {
            transFee = 0;
            document.getElementById('promoNotice').style.display = 'block';
        } else {
            document.getElementById('promoNotice').style.display = 'none';
        }

        // 4. 计算逻辑：(总计 - 25) * 折扣
        const totalRaw = baseTotal + transFee;
        const remainderRaw = Math.max(0, totalRaw - 25);
        const dsRate = parseFloat(document.getElementById('discountInput').value) || 1.0;
        const finalPay = remainderRaw * dsRate;
        const dsSaved = remainderRaw - finalPay;

        // 5. 界面渲染
        document.getElementById('row_base').innerText = `$${baseTotal.toFixed(1)}`;
        document.getElementById('row_trans').innerText = `$${transFee.toFixed(1)}`;
        document.getElementById('row_total_raw').innerText = `$${totalRaw.toFixed(1)}`;
        document.getElementById('row_rem_raw').innerText = `$${remainderRaw.toFixed(1)}`;
        document.getElementById('ds_show').innerText = dsRate;
        document.getElementById('row_ds_val').innerText = `-$${dsSaved.toFixed(1)}`;
        document.getElementById('finalPrice').innerText = `$${finalPay.toFixed(1)}`;
    }

    function capture() {
        html2canvas(document.getElementById('mainCard'), { backgroundColor: "#fff9fb", scale: 3, borderRadius: 28 }).then(canvas => {
            document.getElementById('previewImg').src = canvas.toDataURL("image/png");
            document.getElementById('overlay').style.display = 'flex';
        });
    }

    calc(); // 初始化
</script>
</body>
</html>
